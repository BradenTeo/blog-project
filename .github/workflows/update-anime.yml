name: Update Anime Cache

on:
  schedule:
    - cron: '0 1 * * *' # 1am UTC daily
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch anime list
        run: node scripts/fetch-anime.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/anime-cache.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "chore: update anime cache [skip ci]"
            git push
          )
